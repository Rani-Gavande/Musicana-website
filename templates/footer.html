<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Footer Audio Player</title>
  <style>
    body {
      margin-bottom: 100px; /* space for footer */
      font-family: Arial, sans-serif;
      background-color: #f8f8f8;
    }

    /* Footer container */
    .all-content {
      position: fixed;
      bottom: 0;
      left: 0;
      background-color: #fff;
      width: 100%;
      height: 55px;
      display: grid;
      grid-template-columns: 55px auto;
      align-items: center;
      box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
      user-select: none;
      z-index: 1000;
    }

    /* Album art */
    .img {
      height: 55px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .img img {
      width: 55px;
      height: 55px;
      object-fit: cover;
    }

    /* Audio controls */
    .audio {
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      color: #666;
    }

    button {
      background: #1db954;
      border: none;
      color: white;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(29, 185, 84, 0.6);
      transition: background-color 0.3s ease;
    }
    button:hover {
      background: #17a64a;
    }

    /* Progress bar */
    #progress-container {
      flex: 1;
      height: 6px;
      background: #444;
      border-radius: 8px;
      cursor: pointer;
      position: relative;
    }
    #progress {
      background: #1db954;
      height: 100%;
      width: 0%;
      border-radius: 8px;
      transition: width 0.1s linear;
    }

    .time {
      font-size: 12px;
      color: #aaa;
      width: 40px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- Footer Player -->
<div class="footer">
  <div class="all-content">
    <div class="img">
      <img id="footer-album-art" src="" alt="Album Art">
    </div>
    <div class="audio">
      <audio id="footer-audio" src=""></audio>
      <div class="controls">
        <button id="prev" aria-label="Previous">⏮</button>
        <span class="time" id="current-time">0:00</span>
        <div id="progress-container" title="Seek">
          <div id="progress"></div>
        </div>
        <span class="time" id="duration">0:00</span>
        <button id="play-pause" aria-label="Play">►</button>
        <button id="next" aria-label="Next">⏭</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
